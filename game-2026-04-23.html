<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Burst Bonanza</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050a1f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// Genre: Bubble pop | Date: 2026-04-23

// ── Polyfill roundRect for older browsers ──────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y,     x + w, y + h, r);
    this.arcTo(x + w, y + h, x,     y + h, r);
    this.arcTo(x,     y + h, x,     y,     r);
    this.arcTo(x,     y,     x + w, y,     r);
    this.closePath();
    return this;
  };
}

// ── Canvas setup & responsive sizing ──────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resize() {
  const maxW = Math.min(window.innerWidth,  500);
  const maxH = Math.min(window.innerHeight, 780);
  let w = maxW, h = w * 1.5;
  if (h > maxH) { h = maxH; w = h / 1.5; }
  canvas.width  = Math.floor(w);
  canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', resize);

// ── Game-state constants ───────────────────────────────────────────────────────
const STATE = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.TITLE;

// ── Persistent data ────────────────────────────────────────────────────────────
let highScore = 0;

// ── Per-round data ─────────────────────────────────────────────────────────────
let score, lives, level, bubbles, particles, scorePopups;
let frameCount, lastSpawn, levelTimer, spawnInterval;
let blinkTimer = 0, blinkOn = true;

// ── Colour palette ─────────────────────────────────────────────────────────────
const BUBBLE_COLORS = [
  { fill: 'rgba(100,220,255,0.50)', stroke: '#5dd4f0' },
  { fill: 'rgba(255,160,100,0.50)', stroke: '#f0a05d' },
  { fill: 'rgba(180,100,255,0.50)', stroke: '#c47af0' },
  { fill: 'rgba( 80,230,180,0.50)', stroke: '#50e6b4' },
  { fill: 'rgba(255,220, 80,0.50)', stroke: '#f0dc50' },
  { fill: 'rgba(255,120,160,0.50)', stroke: '#f07890' },
];

// ── Bubble ─────────────────────────────────────────────────────────────────────
class Bubble {
  constructor() {
    const minR = 18, maxR = 44;
    this.r   = minR + Math.random() * (maxR - minR);
    this.x   = this.r + Math.random() * (canvas.width - this.r * 2);
    this.y   = canvas.height + this.r + 10;

    const t           = (this.r - minR) / (maxR - minR); // 0 = small, 1 = big
    const speedBase   = (1.4 + level * 0.28) * (1 + (1 - t) * 0.9);
    this.speed        = speedBase + Math.random() * 0.5;
    this.points       = Math.max(1, Math.round(10 - t * 7 + level));

    this.colorIdx     = Math.floor(Math.random() * BUBBLE_COLORS.length);
    this.wobble       = Math.random() * Math.PI * 2;
    this.wobbleSpeed  = 0.025 + Math.random() * 0.025;
    this.wobbleAmp    = 0.6   + Math.random() * 1.2;

    this.popped       = false;
    this.popScale     = 1;
    this.popAlpha     = 1;
  }

  update() {
    if (this.popped) {
      this.popScale += 0.14;
      this.popAlpha  = Math.max(0, 1 - (this.popScale - 1) / 0.65);
      return;
    }
    this.y -= this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += Math.sin(this.wobble) * this.wobbleAmp;
    this.x  = Math.max(this.r, Math.min(canvas.width - this.r, this.x));
  }

  draw() {
    const c = BUBBLE_COLORS[this.colorIdx];
    const r = this.r * (this.popped ? this.popScale : 1);
    ctx.save();
    ctx.globalAlpha = this.popped ? this.popAlpha : 1;

    // Body
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle   = c.fill;
    ctx.fill();
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Large shine
    ctx.beginPath();
    ctx.arc(this.x - r * 0.3, this.y - r * 0.3, r * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fill();

    // Small shine
    ctx.beginPath();
    ctx.arc(this.x + r * 0.25, this.y - r * 0.45, r * 0.10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

    ctx.restore();
  }

  isGone()          { return this.popped ? (this.popAlpha <= 0) : (this.y + this.r < 0); }
  hits(px, py)      { const dx = px - this.x, dy = py - this.y; return dx*dx + dy*dy <= this.r*this.r; }
}

// ── Particle ───────────────────────────────────────────────────────────────────
class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    const ang  = Math.random() * Math.PI * 2;
    const spd  = 2 + Math.random() * 4;
    this.vx    = Math.cos(ang) * spd;
    this.vy    = Math.sin(ang) * spd;
    this.life  = 1.0;
    this.decay = 0.04 + Math.random() * 0.04;
    this.r     = 2   + Math.random() * 3;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.life -= this.decay; }
  draw()   {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

// ── Score popup ────────────────────────────────────────────────────────────────
class ScorePopup {
  constructor(x, y, pts) { this.x = x; this.y = y; this.pts = pts; this.life = 1; }
  update() { this.y -= 1.4; this.life -= 0.024; }
  draw()   {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.font      = `bold ${Math.floor(canvas.width * 0.048)}px Arial`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText('+' + this.pts, this.x, this.y);
    ctx.restore();
  }
}

// ── Background ─────────────────────────────────────────────────────────────────
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0,   '#050a1f');
  g.addColorStop(0.6, '#0a1a42');
  g.addColorStop(1,   '#082235');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Slow caustic shimmer
  ctx.strokeStyle = 'rgba(100,180,255,0.045)';
  ctx.lineWidth   = 1;
  for (let i = 0; i < 9; i++) {
    const y = (frameCount * 0.25 + i * (canvas.height / 8)) % canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // Sandy floor strip
  const sf = ctx.createLinearGradient(0, canvas.height - 36, 0, canvas.height);
  sf.addColorStop(0, 'rgba(200,165,90,0)');
  sf.addColorStop(1, 'rgba(200,165,90,0.38)');
  ctx.fillStyle = sf;
  ctx.fillRect(0, canvas.height - 36, canvas.width, 36);
}

// ── HUD ────────────────────────────────────────────────────────────────────────
function drawHUD() {
  const fs = Math.floor(canvas.width * 0.048);
  const ph = fs * 1.85;

  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.roundRect(8, 8, canvas.width - 16, ph, 10);
  ctx.fill();

  // Score
  ctx.font      = `bold ${fs}px Arial`;
  ctx.fillStyle = '#7ff';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 18, 8 + ph * 0.72);

  // Level
  ctx.fillStyle = '#ff9';
  ctx.textAlign = 'center';
  ctx.fillText('Lv ' + level, canvas.width / 2, 8 + ph * 0.72);

  // Life bubbles
  const bR  = fs * 0.38;
  const bY  = 8 + ph * 0.50;
  const bX0 = canvas.width - 18 - bR;
  for (let i = 0; i < 3; i++) {
    const bx = bX0 - i * (bR * 2.3);
    ctx.beginPath();
    ctx.arc(bx, bY, bR, 0, Math.PI * 2);
    ctx.fillStyle   = i < lives ? 'rgba(100,220,255,0.80)' : 'rgba(80,80,100,0.35)';
    ctx.fill();
    ctx.strokeStyle = i < lives ? '#5dd4f0' : '#445';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    if (i < lives) {
      ctx.beginPath();
      ctx.arc(bx - bR * 0.3, bY - bR * 0.3, bR * 0.28, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();
    }
  }
}

// ── Title screen ───────────────────────────────────────────────────────────────
function drawTitle() {
  drawBackground();

  // Decorative rising bubbles
  ctx.save();
  ctx.globalAlpha = 0.25;
  for (let i = 0; i < 9; i++) {
    const bx = (canvas.width * 0.08) + i * (canvas.width * 0.11);
    const by = canvas.height * 0.60 + Math.sin(frameCount * 0.018 + i * 0.8) * 28;
    const br = 12 + (i % 3) * 8;
    const c  = BUBBLE_COLORS[i % BUBBLE_COLORS.length];
    ctx.beginPath();
    ctx.arc(bx % canvas.width, by, br, 0, Math.PI * 2);
    ctx.fillStyle   = c.fill;
    ctx.fill();
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth   = 2;
    ctx.stroke();
  }
  ctx.restore();

  // Big title text
  const ts = Math.floor(canvas.width * 0.115);
  ctx.textAlign = 'center';

  // Shadow layer
  ctx.font      = `bold ${ts}px Arial`;
  ctx.fillStyle = 'rgba(0,80,160,0.55)';
  ctx.fillText('BUBBLE', canvas.width / 2 + 3, canvas.height * 0.26 + 3);
  ctx.fillText('BURST',  canvas.width / 2 + 3, canvas.height * 0.26 + ts * 1.12 + 3);

  // Gradient text
  const tg = ctx.createLinearGradient(0, canvas.height * 0.17, 0, canvas.height * 0.43);
  tg.addColorStop(0, '#aef');
  tg.addColorStop(1, '#08c');
  ctx.fillStyle = tg;
  ctx.fillText('BUBBLE', canvas.width / 2, canvas.height * 0.26);
  ctx.fillText('BURST',  canvas.width / 2, canvas.height * 0.26 + ts * 1.12);

  ctx.font      = `bold ${Math.floor(canvas.width * 0.068)}px Arial`;
  ctx.fillStyle = '#ffeaa0';
  ctx.fillText('BONANZA', canvas.width / 2, canvas.height * 0.26 + ts * 2.32);

  // Instructions
  const is = Math.floor(canvas.width * 0.042);
  ctx.font      = `${is}px Arial`;
  ctx.fillStyle = 'rgba(200,230,255,0.85)';
  ctx.fillText('Pop bubbles before they escape!', canvas.width / 2, canvas.height * 0.60);
  ctx.fillText('Smaller bubbles = more points', canvas.width / 2, canvas.height * 0.655);
  ctx.fillText('3 lives  •  Click or tap to pop', canvas.width / 2, canvas.height * 0.71);

  if (highScore > 0) {
    ctx.font      = `bold ${is}px Arial`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('Best: ' + highScore, canvas.width / 2, canvas.height * 0.775);
  }

  // Blinking prompt
  blinkTimer++;
  if (blinkTimer > 34) { blinkOn = !blinkOn; blinkTimer = 0; }
  if (blinkOn) {
    ctx.font      = `bold ${Math.floor(is * 1.05)}px Arial`;
    ctx.fillStyle = '#7ff';
    ctx.fillText('Press any key or Click to Start', canvas.width / 2, canvas.height * 0.865);
  }
}

// ── Game-over screen ───────────────────────────────────────────────────────────
function drawGameOver() {
  drawBackground();
  particles.forEach(p => { p.update(); p.draw(); });

  const fs = Math.floor(canvas.width * 0.10);
  ctx.textAlign = 'center';
  ctx.font      = `bold ${fs}px Arial`;
  ctx.fillStyle = '#f55';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height * 0.30);

  const sf = Math.floor(canvas.width * 0.055);
  ctx.font      = `${sf}px Arial`;
  ctx.fillStyle = '#fff';
  ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height * 0.44);

  if (score > 0 && score >= highScore) {
    ctx.font      = `bold ${sf}px Arial`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, canvas.height * 0.52);
  } else {
    ctx.font      = `${sf}px Arial`;
    ctx.fillStyle = '#aaa';
    ctx.fillText('Best: ' + highScore, canvas.width / 2, canvas.height * 0.52);
  }

  // Play again button
  const bw = canvas.width * 0.56, bh = canvas.height * 0.085;
  const bx = canvas.width / 2 - bw / 2, by = canvas.height * 0.62;
  ctx.fillStyle   = 'rgba(0,140,240,0.88)';
  ctx.roundRect(bx, by, bw, bh, 12);
  ctx.fill();
  ctx.strokeStyle = '#7ff';
  ctx.lineWidth   = 2;
  ctx.roundRect(bx, by, bw, bh, 12);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font      = `bold ${Math.floor(canvas.width * 0.057)}px Arial`;
  ctx.fillText('PLAY AGAIN', canvas.width / 2, by + bh * 0.68);

  blinkTimer++;
  if (blinkTimer > 34) { blinkOn = !blinkOn; blinkTimer = 0; }
}

// ── Reset ──────────────────────────────────────────────────────────────────────
function resetGame() {
  score = 0; lives = 3; level = 1;
  bubbles = []; particles = []; scorePopups = [];
  frameCount = 0; lastSpawn = 0; levelTimer = 0;
  spawnInterval = 90;
}

// ── Pop logic ──────────────────────────────────────────────────────────────────
function tryPop(px, py) {
  if (state !== STATE.PLAYING) return;
  let hit = null, minR = Infinity;
  for (const b of bubbles) {
    if (!b.popped && b.hits(px, py) && b.r < minR) { minR = b.r; hit = b; }
  }
  if (!hit) return;
  hit.popped = true;
  score += hit.points;
  scorePopups.push(new ScorePopup(hit.x, hit.y - hit.r, hit.points));
  const c = BUBBLE_COLORS[hit.colorIdx];
  for (let i = 0; i < 10; i++) particles.push(new Particle(hit.x, hit.y, c.stroke));
}

// ── Update (playing) ───────────────────────────────────────────────────────────
function update() {
  frameCount++;
  levelTimer++;

  // Level up every ~22 s (1320 frames)
  if (levelTimer >= 1320) {
    level++;
    levelTimer    = 0;
    spawnInterval = Math.max(28, 90 - level * 9);
  }

  // Spawn
  if (frameCount - lastSpawn >= spawnInterval) {
    bubbles.push(new Bubble());
    lastSpawn = frameCount;
    if (level > 3 && Math.random() < 0.22) bubbles.push(new Bubble());
  }

  // Update & cull bubbles
  bubbles.forEach(b => b.update());
  bubbles = bubbles.filter(b => {
    if (!b.popped && b.y + b.r < 0) { lives--; return false; }
    return !b.isGone();
  });

  // Particles & popups
  particles  = particles.filter( p => { p.update(); return p.life  > 0; });
  scorePopups = scorePopups.filter(p => { p.update(); return p.life > 0; });

  if (lives <= 0) {
    if (score > highScore) highScore = score;
    state = STATE.GAMEOVER;
  }
}

// ── Draw (playing) ─────────────────────────────────────────────────────────────
function draw() {
  if      (state === STATE.TITLE)    { drawTitle();    return; }
  else if (state === STATE.GAMEOVER) { drawGameOver(); return; }

  drawBackground();
  bubbles.forEach(b => b.draw());
  particles.forEach(p => p.draw());
  scorePopups.forEach(p => p.draw());
  drawHUD();
}

// ── Game loop ──────────────────────────────────────────────────────────────────
function loop() {
  if (state === STATE.PLAYING) update();
  draw();
  requestAnimationFrame(loop);
}

// ── Input: mouse ──────────────────────────────────────────────────────────────
function canvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (canvas.height / rect.height),
  };
}

canvas.addEventListener('click', e => {
  const p = canvasPos(e);
  if (state === STATE.TITLE)    { resetGame(); state = STATE.PLAYING; }
  else if (state === STATE.PLAYING)  { tryPop(p.x, p.y); }
  else if (state === STATE.GAMEOVER) { resetGame(); state = STATE.PLAYING; }
});

// ── Input: touch ──────────────────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t    = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const p    = {
    x: (t.clientX - rect.left) * (canvas.width  / rect.width),
    y: (t.clientY - rect.top)  * (canvas.height / rect.height),
  };
  if (state === STATE.TITLE)         { resetGame(); state = STATE.PLAYING; }
  else if (state === STATE.PLAYING)  { tryPop(p.x, p.y); }
  else if (state === STATE.GAMEOVER) { resetGame(); state = STATE.PLAYING; }
}, { passive: false });

// ── Input: keyboard ───────────────────────────────────────────────────────────
document.addEventListener('keydown', () => {
  if (state === STATE.TITLE)         { resetGame(); state = STATE.PLAYING; }
  else if (state === STATE.GAMEOVER) { resetGame(); state = STATE.PLAYING; }
});

// ── Kick it off ───────────────────────────────────────────────────────────────
loop();
</script>
</body>
</html>
