<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bouncebloom — Petal Drop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: linear-gradient(180deg, #f9d5e5 0%, #d6e6f2 50%, #cfe8d3 100%);
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    color: #4a3c5e;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #game {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
  }
  #playAgain {
    position: absolute;
    left: 50%;
    top: 70%;
    transform: translate(-50%, -50%);
    padding: 14px 36px;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1.5px;
    background: linear-gradient(180deg, #ff9eb5, #f06292);
    color: #fff;
    border: none;
    border-radius: 32px;
    box-shadow: 0 6px 14px rgba(240, 98, 146, 0.4), inset 0 -3px 0 rgba(0,0,0,0.1);
    cursor: pointer;
    display: none;
    transition: transform 0.1s;
  }
  #playAgain:hover { transform: translate(-50%, -50%) scale(1.05); }
  #playAgain:active { transform: translate(-50%, -50%) scale(0.97); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="playAgain">PLAY AGAIN</button>

<script>
// Genre: Physics bouncer | Date: 2026-04-25
// Bouncebloom — a Peggle-inspired pastel garden physics game.

(function() {
  'use strict';

  // ---------- roundRect polyfill ----------
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      else if (r.length === 1) r = [r[0], r[0], r[0], r[0]];
      this.beginPath();
      this.moveTo(x + r[0], y);
      this.lineTo(x + w - r[1], y);
      this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
      this.lineTo(x + w, y + h - r[2]);
      this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
      this.lineTo(x + r[3], y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
      this.lineTo(x, y + r[0]);
      this.quadraticCurveTo(x, y, x + r[0], y);
      this.closePath();
      return this;
    };
  }

  // ---------- Setup ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const playAgainBtn = document.getElementById('playAgain');

  let W = 0, H = 0;
  const ASPECT = 9 / 14; // play field aspect
  let FW = 540, FH = 840; // logical field size, recomputed on resize
  let OFFX = 0, OFFY = 0; // letterbox offsets
  let SCALE = 1;

  function resize() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // fit field to screen with letterbox
    const screenAspect = W / H;
    if (screenAspect > ASPECT) {
      FH = Math.min(H * 0.96, 880);
      FW = FH * ASPECT;
    } else {
      FW = Math.min(W * 0.96, 600);
      FH = FW / ASPECT;
    }
    OFFX = (W - FW) / 2;
    OFFY = (H - FH) / 2;
    SCALE = FW / 540;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Input ----------
  const input = {
    mx: 0, my: 0,         // logical mouse coords inside field
    rawX: 0, rawY: 0,     // raw screen coords
    aim: -Math.PI / 2,    // angle pointing up
    fire: false,
    anyKey: false,
    left: false, right: false,
  };

  function updateMouseFromRaw() {
    input.mx = (input.rawX - OFFX);
    input.my = (input.rawY - OFFY);
  }

  canvas.addEventListener('mousemove', e => {
    input.rawX = e.clientX; input.rawY = e.clientY;
    updateMouseFromRaw();
  });
  canvas.addEventListener('mousedown', e => {
    input.rawX = e.clientX; input.rawY = e.clientY;
    updateMouseFromRaw();
    input.fire = true;
    input.anyKey = true;
  });
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length) {
      input.rawX = e.touches[0].clientX;
      input.rawY = e.touches[0].clientY;
      updateMouseFromRaw();
      input.fire = true;
      input.anyKey = true;
    }
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length) {
      input.rawX = e.touches[0].clientX;
      input.rawY = e.touches[0].clientY;
      updateMouseFromRaw();
    }
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('keydown', e => {
    input.anyKey = true;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = true;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = true;
    if (e.code === 'Space' || e.code === 'Enter') {
      input.fire = true;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') input.left = false;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') input.right = false;
  });

  // ---------- Game state ----------
  const STATE = { TITLE: 0, AIM: 1, FLY: 2, CLEAR: 3, OVER: 4 };
  let state = STATE.TITLE;

  let pegs = [];
  let ball = null;
  let balls = 8;
  let score = 0;
  let level = 1;
  let targetsLeft = 0;
  let blink = 0;
  let clearTimer = 0;
  let particles = [];
  let bucket = { x: 0, y: 0, w: 90, vx: 1.2, dir: 1 };
  let highScore = 0;
  try { highScore = parseInt(localStorage.getItem('bouncebloom_hi') || '0', 10) || 0; } catch (e) { highScore = 0; }

  const COLORS = {
    sky1: '#fce4ec',
    sky2: '#e1f5fe',
    grass: '#cfe8d3',
    petal: '#f48fb1',
    petalGlow: '#ffc1d7',
    bud: '#a5d6a7',
    budGlow: '#c8e6c9',
    leaf: '#81c784',
    target: '#ff8a65',
    targetGlow: '#ffccbc',
    bonus: '#ba68c8',
    bonusGlow: '#e1bee7',
    ball: '#ffffff',
    cannon: '#7e57c2',
    cannonAccent: '#b39ddb',
    text: '#4a3c5e',
    textSoft: '#7a6c8e',
  };

  // ---------- Level generation ----------
  function generateLevel(lvl) {
    pegs = [];
    const fieldX = 30, fieldY = 110;
    const fieldW = 540 - 60, fieldH = 840 - 280;

    const rows = 7 + Math.min(3, Math.floor(lvl / 2));
    const cols = 9;
    const cellW = fieldW / cols;
    const cellH = fieldH / rows;

    let candidates = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // skew: skip some randomly to create patterns
        const offset = (r % 2 === 0) ? 0 : cellW * 0.5;
        const px = fieldX + c * cellW + cellW * 0.5 + offset + (Math.random() - 0.5) * cellW * 0.25;
        const py = fieldY + r * cellH + cellH * 0.5 + (Math.random() - 0.5) * cellH * 0.2;
        if (px < fieldX + 18 || px > fieldX + fieldW - 18) continue;
        if (Math.random() < 0.18) continue; // small holes
        candidates.push({ x: px, y: py });
      }
    }

    // assign types
    const targetCount = Math.min(candidates.length, 10 + lvl * 2);
    // shuffle
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }

    candidates.forEach((c, i) => {
      let type;
      if (i < targetCount) type = 'target';
      else if (i < targetCount + 2) type = 'bonus';
      else type = 'normal';
      pegs.push({
        x: c.x, y: c.y,
        r: 11,
        type: type,
        hit: false,
        wobble: Math.random() * Math.PI * 2,
        wobbleAmp: 0.6 + Math.random() * 0.5,
      });
    });

    targetsLeft = pegs.filter(p => p.type === 'target').length;
  }

  // ---------- Reset / start ----------
  function startGame() {
    score = 0;
    balls = 8;
    level = 1;
    generateLevel(level);
    state = STATE.AIM;
    ball = null;
    particles = [];
    playAgainBtn.style.display = 'none';
  }

  function nextLevel() {
    level++;
    balls = Math.min(8, balls + 2);
    generateLevel(level);
    state = STATE.AIM;
    ball = null;
  }

  function endGame() {
    state = STATE.OVER;
    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem('bouncebloom_hi', String(highScore)); } catch (e) {}
    }
    playAgainBtn.style.display = 'block';
  }

  playAgainBtn.addEventListener('click', () => {
    startGame();
  });

  // ---------- Physics ----------
  const GRAVITY = 0.32;
  const RESTITUTION = 0.78;
  const MAX_SPEED = 14;

  function fireBall() {
    const cx = 540 / 2;
    const cy = 70;
    const speed = 9.5;
    let ang = input.aim;
    // clamp downward-ish
    const minA = Math.PI * 0.12, maxA = Math.PI - Math.PI * 0.12;
    if (ang < minA) ang = minA;
    if (ang > maxA) ang = maxA;
    ball = {
      x: cx + Math.cos(ang) * 30,
      y: cy + Math.sin(ang) * 30,
      vx: Math.cos(ang) * speed,
      vy: Math.sin(ang) * speed,
      r: 9,
      trail: [],
    };
    state = STATE.FLY;
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 3.5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        life: 30 + Math.random() * 20,
        maxLife: 50,
        color: color,
        size: 2 + Math.random() * 3,
      });
    }
  }

  function updateBall() {
    if (!ball) return;

    ball.vy += GRAVITY;
    // clamp speed
    const sp = Math.hypot(ball.vx, ball.vy);
    if (sp > MAX_SPEED) {
      ball.vx = ball.vx / sp * MAX_SPEED;
      ball.vy = ball.vy / sp * MAX_SPEED;
    }

    // sub-step for stability
    const steps = 3;
    for (let s = 0; s < steps; s++) {
      ball.x += ball.vx / steps;
      ball.y += ball.vy / steps;

      // walls
      if (ball.x - ball.r < 12) {
        ball.x = 12 + ball.r;
        ball.vx = -ball.vx * RESTITUTION;
      }
      if (ball.x + ball.r > 540 - 12) {
        ball.x = 540 - 12 - ball.r;
        ball.vx = -ball.vx * RESTITUTION;
      }
      if (ball.y - ball.r < 12) {
        ball.y = 12 + ball.r;
        ball.vy = -ball.vy * RESTITUTION;
      }

      // pegs
      for (const p of pegs) {
        if (p.hit) continue;
        const dx = ball.x - p.x, dy = ball.y - p.y;
        const d2 = dx * dx + dy * dy;
        const rr = ball.r + p.r;
        if (d2 < rr * rr) {
          const d = Math.sqrt(d2) || 0.01;
          const nx = dx / d, ny = dy / d;
          // separate
          const overlap = rr - d;
          ball.x += nx * overlap;
          ball.y += ny * overlap;
          // reflect
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx = (ball.vx - 2 * dot * nx) * RESTITUTION;
          ball.vy = (ball.vy - 2 * dot * ny) * RESTITUTION;
          // hit peg
          p.hit = true;
          let pts = 10;
          let col = COLORS.budGlow;
          if (p.type === 'target') {
            pts = 100;
            col = COLORS.targetGlow;
            targetsLeft = Math.max(0, targetsLeft - 1);
          } else if (p.type === 'bonus') {
            pts = 250;
            col = COLORS.bonusGlow;
            // refund a ball as bonus
            balls = Math.min(12, balls + 1);
          }
          score += pts;
          spawnParticles(p.x, p.y, col, p.type === 'normal' ? 8 : 16);
        }
      }
    }

    // bucket
    bucket.x += bucket.vx * bucket.dir;
    if (bucket.x < 30) { bucket.x = 30; bucket.dir = 1; }
    if (bucket.x + bucket.w > 510) { bucket.x = 510 - bucket.w; bucket.dir = -1; }

    // bottom: check bucket catch
    if (ball.y - ball.r > 840) {
      // off screen: did it go through bucket?
      const inBucketX = ball.x > bucket.x + 4 && ball.x < bucket.x + bucket.w - 4;
      // Bucket is at y = ~ 800
      const caught = inBucketX && ball.y - ball.r >= 790 && ball.y - ball.r <= 845 && ball.vy > 0;
      // because of fast updates, simply check final inBucketX
      if (inBucketX) {
        // bonus ball
        balls = Math.min(12, balls + 1);
        score += 50;
        spawnParticles(ball.x, 800, '#ffe082', 18);
      }
      ball = null;

      // check level state
      if (targetsLeft <= 0) {
        state = STATE.CLEAR;
        clearTimer = 90;
        score += balls * 100; // remaining balls bonus
      } else {
        balls--;
        if (balls <= 0) {
          endGame();
        } else {
          state = STATE.AIM;
        }
      }
    }

    // trail
    ball && ball.trail.push({ x: ball.x, y: ball.y });
    if (ball && ball.trail.length > 10) ball.trail.shift();
  }

  function updateParticles() {
    for (const p of particles) {
      p.vy += 0.18;
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  // ---------- Rendering ----------
  function drawBackground() {
    // pastel sky gradient
    const grd = ctx.createLinearGradient(0, 0, 0, 840);
    grd.addColorStop(0, '#fce4ec');
    grd.addColorStop(0.5, '#e8eaf6');
    grd.addColorStop(1, '#cfe8d3');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, 540, 840);

    // soft hills
    ctx.fillStyle = 'rgba(174, 213, 129, 0.25)';
    ctx.beginPath();
    ctx.moveTo(0, 760);
    for (let x = 0; x <= 540; x += 30) {
      ctx.lineTo(x, 740 + Math.sin(x * 0.02) * 14);
    }
    ctx.lineTo(540, 840);
    ctx.lineTo(0, 840);
    ctx.closePath();
    ctx.fill();

    // floating petals
    const t = performance.now() / 1000;
    ctx.save();
    for (let i = 0; i < 14; i++) {
      const x = (i * 71 + (t * 12) % 540) % 540;
      const y = (i * 53 + (t * 18) % 840) % 840;
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = (i % 2) ? '#f8bbd0' : '#e1bee7';
      ctx.beginPath();
      ctx.ellipse(x, y, 5, 3, t + i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // play area border
    ctx.strokeStyle = 'rgba(124, 96, 158, 0.35)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(8, 8, 524, 824, 18);
    ctx.stroke();
  }

  function drawCannon() {
    const cx = 270, cy = 70;

    // pedestal
    ctx.fillStyle = COLORS.cannonAccent;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fill();

    // barrel
    let ang = input.aim;
    const minA = Math.PI * 0.12, maxA = Math.PI - Math.PI * 0.12;
    if (ang < minA) ang = minA;
    if (ang > maxA) ang = maxA;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ang - Math.PI / 2);
    // barrel body
    const bg = ctx.createLinearGradient(-12, 0, 12, 0);
    bg.addColorStop(0, '#5e35b1');
    bg.addColorStop(0.5, '#9575cd');
    bg.addColorStop(1, '#5e35b1');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.roundRect(-10, 0, 20, 38, 6);
    ctx.fill();
    // barrel tip
    ctx.fillStyle = '#ede7f6';
    ctx.beginPath();
    ctx.roundRect(-12, 32, 24, 8, 3);
    ctx.fill();
    ctx.restore();

    // center dot
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawAimGuide() {
    if (state !== STATE.AIM) return;
    const cx = 270, cy = 70;
    let ang = input.aim;
    const minA = Math.PI * 0.12, maxA = Math.PI - Math.PI * 0.12;
    if (ang < minA) ang = minA;
    if (ang > maxA) ang = maxA;
    // simulate ahead with gravity, no peg collision
    const speed = 9.5;
    let x = cx + Math.cos(ang) * 30;
    let y = cy + Math.sin(ang) * 30;
    let vx = Math.cos(ang) * speed;
    let vy = Math.sin(ang) * speed;
    ctx.save();
    for (let i = 0; i < 22; i++) {
      vy += GRAVITY;
      x += vx; y += vy;
      if (x < 12 || x > 528 || y < 0) break;
      ctx.fillStyle = `rgba(126, 87, 194, ${0.55 - i * 0.02})`;
      ctx.beginPath();
      ctx.arc(x, y, 3.3 - i * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPegs() {
    const t = performance.now() / 600;
    for (const p of pegs) {
      if (p.hit) continue;
      let main, glow;
      if (p.type === 'target') { main = COLORS.target; glow = COLORS.targetGlow; }
      else if (p.type === 'bonus') { main = COLORS.bonus; glow = COLORS.bonusGlow; }
      else { main = COLORS.bud; glow = COLORS.budGlow; }

      const wob = Math.sin(t + p.wobble) * p.wobbleAmp;

      // glow
      ctx.save();
      const grd = ctx.createRadialGradient(p.x, p.y, p.r * 0.4, p.x, p.y, p.r * 2.4);
      grd.addColorStop(0, glow);
      grd.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grd;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // petals (for target)
      if (p.type === 'target') {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(wob * 0.2);
        for (let i = 0; i < 5; i++) {
          ctx.rotate((Math.PI * 2) / 5);
          ctx.fillStyle = COLORS.petal;
          ctx.beginPath();
          ctx.ellipse(0, -p.r - 2, 5, 7, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (p.type === 'bonus') {
        // sparkly star ring
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(t);
        for (let i = 0; i < 6; i++) {
          ctx.rotate((Math.PI * 2) / 6);
          ctx.fillStyle = '#fff59d';
          ctx.beginPath();
          ctx.arc(0, -p.r - 4, 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // body
      ctx.fillStyle = main;
      ctx.beginPath();
      ctx.arc(p.x, p.y + wob * 0.3, p.r, 0, Math.PI * 2);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(p.x - 3, p.y - 3 + wob * 0.3, p.r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // dot center for target
      if (p.type === 'target') {
        ctx.fillStyle = '#fff8e1';
        ctx.beginPath();
        ctx.arc(p.x, p.y + wob * 0.3, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawBucket() {
    const x = bucket.x, y = 800, w = bucket.w, h = 22;
    ctx.fillStyle = '#ffd180';
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 6);
    ctx.fill();
    // basket weave lines
    ctx.strokeStyle = '#ef9a9a';
    ctx.lineWidth = 1.5;
    for (let i = 6; i < w - 4; i += 8) {
      ctx.beginPath();
      ctx.moveTo(x + i, y + 2);
      ctx.lineTo(x + i, y + h - 2);
      ctx.stroke();
    }
    // rim
    ctx.fillStyle = '#fff3e0';
    ctx.beginPath();
    ctx.roundRect(x, y - 3, w, 5, 3);
    ctx.fill();
    // small flowers on rim
    ctx.fillStyle = COLORS.petal;
    ctx.beginPath();
    ctx.arc(x + 8, y - 3, 3, 0, Math.PI * 2);
    ctx.arc(x + w - 8, y - 3, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBall() {
    if (!ball) return;
    // trail
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      ctx.fillStyle = `rgba(255, 255, 255, ${(i / ball.trail.length) * 0.4})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
      ctx.fill();
    }
    // ball
    const grd = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.r);
    grd.addColorStop(0, '#ffffff');
    grd.addColorStop(0.7, '#fff8e1');
    grd.addColorStop(1, '#ffe082');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(ball.x - 3, ball.y - 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    // top bar background
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.roundRect(20, 18, 500, 44, 14);
    ctx.fill();

    ctx.fillStyle = COLORS.text;
    ctx.font = 'bold 18px Trebuchet MS';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE  ${score}`, 36, 40);

    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, 270, 40);

    ctx.textAlign = 'right';
    // ball icons
    const bx = 506, by = 40;
    ctx.fillText(`x ${balls}`, bx, by);
    // little ball icon
    ctx.fillStyle = '#ffe082';
    ctx.beginPath();
    ctx.arc(bx - 50, by, 6, 0, Math.PI * 2);
    ctx.fill();

    // targets-left strip
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.roundRect(20, 70, 500, 26, 10);
    ctx.fill();
    ctx.fillStyle = COLORS.text;
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px Trebuchet MS';
    ctx.fillText(`Petals to bloom: ${targetsLeft}`, 270, 83);
  }

  function drawTitle() {
    drawBackground();

    // big title
    const t = performance.now() / 500;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // big shadow
    ctx.font = 'bold 64px Trebuchet MS';
    ctx.fillStyle = 'rgba(124, 96, 158, 0.18)';
    ctx.fillText('BOUNCEBLOOM', 270 + 4, 230 + 5);

    // gradient title
    const tg = ctx.createLinearGradient(0, 180, 0, 280);
    tg.addColorStop(0, '#f06292');
    tg.addColorStop(0.5, '#ba68c8');
    tg.addColorStop(1, '#7986cb');
    ctx.fillStyle = tg;
    ctx.fillText('BOUNCEBLOOM', 270, 230);

    ctx.font = 'italic 22px Trebuchet MS';
    ctx.fillStyle = COLORS.textSoft;
    ctx.fillText('a peggle-style petal drop', 270, 280);

    // illustration: cannon + flowers
    // cannon mock at top
    ctx.fillStyle = '#9575cd';
    ctx.beginPath();
    ctx.arc(270, 360, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.save();
    ctx.translate(270, 360);
    ctx.rotate(Math.sin(t) * 0.3);
    ctx.fillStyle = '#7e57c2';
    ctx.beginPath();
    ctx.roundRect(-12, 0, 24, 44, 8);
    ctx.fill();
    ctx.restore();

    // sample pegs around
    const samples = [
      { x: 170, y: 470, c: COLORS.bud, t: 'normal' },
      { x: 220, y: 510, c: COLORS.target, t: 'target' },
      { x: 290, y: 460, c: COLORS.bud, t: 'normal' },
      { x: 350, y: 505, c: COLORS.bonus, t: 'bonus' },
      { x: 380, y: 450, c: COLORS.bud, t: 'normal' },
      { x: 200, y: 560, c: COLORS.target, t: 'target' },
      { x: 330, y: 575, c: COLORS.target, t: 'target' },
    ];
    for (const s of samples) {
      ctx.fillStyle = s.c;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 12, 0, Math.PI * 2);
      ctx.fill();
      if (s.t === 'target') {
        ctx.save();
        ctx.translate(s.x, s.y);
        for (let i = 0; i < 5; i++) {
          ctx.rotate((Math.PI * 2) / 5);
          ctx.fillStyle = COLORS.petal;
          ctx.beginPath();
          ctx.ellipse(0, -14, 5, 7, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    // controls
    ctx.font = '16px Trebuchet MS';
    ctx.fillStyle = COLORS.text;
    ctx.fillText('Aim with mouse / arrow keys  •  Click or Space to fire', 270, 660);
    ctx.fillText('Pop all pink petal pegs to bloom each level', 270, 686);

    // blinking start
    blink += 1 / 60;
    if (Math.floor(blink * 1.6) % 2 === 0) {
      ctx.font = 'bold 22px Trebuchet MS';
      const tg2 = ctx.createLinearGradient(0, 720, 0, 760);
      tg2.addColorStop(0, '#ff8a65');
      tg2.addColorStop(1, '#f06292');
      ctx.fillStyle = tg2;
      ctx.fillText('Press any key or Click to start', 270, 740);
    }

    // version note
    ctx.font = '12px Trebuchet MS';
    ctx.fillStyle = COLORS.textSoft;
    ctx.fillText('High score: ' + highScore, 270, 790);

    ctx.restore();
  }

  function drawClear() {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(0, 0, 540, 840);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 48px Trebuchet MS';
    const tg = ctx.createLinearGradient(0, 380, 0, 440);
    tg.addColorStop(0, '#f06292');
    tg.addColorStop(1, '#7986cb');
    ctx.fillStyle = tg;
    ctx.fillText('LEVEL CLEAR!', 270, 400);
    ctx.font = '20px Trebuchet MS';
    ctx.fillStyle = COLORS.text;
    ctx.fillText(`Score: ${score}`, 270, 460);
    ctx.font = 'italic 16px Trebuchet MS';
    ctx.fillStyle = COLORS.textSoft;
    ctx.fillText('next level starting...', 270, 500);
    ctx.restore();
  }

  function drawGameOver() {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.fillRect(0, 0, 540, 840);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 56px Trebuchet MS';
    const tg = ctx.createLinearGradient(0, 240, 0, 320);
    tg.addColorStop(0, '#7986cb');
    tg.addColorStop(1, '#ba68c8');
    ctx.fillStyle = tg;
    ctx.fillText('GAME OVER', 270, 280);

    ctx.font = 'bold 28px Trebuchet MS';
    ctx.fillStyle = COLORS.text;
    ctx.fillText(`Final Score: ${score}`, 270, 360);
    ctx.font = '18px Trebuchet MS';
    ctx.fillStyle = COLORS.textSoft;
    ctx.fillText(`High Score: ${highScore}`, 270, 395);
    ctx.fillText(`Level reached: ${level}`, 270, 420);
    ctx.restore();
  }

  // ---------- Update ----------
  function updateAim() {
    // mouse aim
    const cx = 270, cy = 70;
    const lx = (input.mx) / SCALE;
    const ly = (input.my) / SCALE;
    if (lx >= 0 && lx <= 540 && ly >= 0 && ly <= 840) {
      input.aim = Math.atan2(ly - cy, lx - cx);
    }
    // keyboard adjust
    if (input.left)  input.aim -= 0.025;
    if (input.right) input.aim += 0.025;
    // clamp
    const minA = Math.PI * 0.12, maxA = Math.PI - Math.PI * 0.12;
    if (input.aim < minA) input.aim = minA;
    if (input.aim > maxA) input.aim = maxA;
  }

  function update() {
    if (state === STATE.TITLE) {
      if (input.anyKey || input.fire) {
        startGame();
      }
    } else if (state === STATE.AIM) {
      updateAim();
      // bucket moves on AIM too for atmosphere
      bucket.x += bucket.vx * bucket.dir;
      if (bucket.x < 30) { bucket.x = 30; bucket.dir = 1; }
      if (bucket.x + bucket.w > 510) { bucket.x = 510 - bucket.w; bucket.dir = -1; }
      if (input.fire) {
        fireBall();
      }
    } else if (state === STATE.FLY) {
      updateBall();
    } else if (state === STATE.CLEAR) {
      clearTimer--;
      if (clearTimer <= 0) {
        nextLevel();
      }
    } else if (state === STATE.OVER) {
      // wait for play again click
    }
    updateParticles();

    input.fire = false;
    input.anyKey = false;
  }

  // ---------- Main render ----------
  function render() {
    // outer clear
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#fbe9e7';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();

    // shift to field
    ctx.save();
    ctx.translate(OFFX, OFFY);
    ctx.scale(SCALE, SCALE);
    // clip to field
    ctx.beginPath();
    ctx.roundRect(0, 0, 540, 840, 18);
    ctx.clip();

    if (state === STATE.TITLE) {
      drawTitle();
    } else {
      drawBackground();
      drawPegs();
      drawCannon();
      drawAimGuide();
      drawBucket();
      drawBall();
      drawParticles();
      drawHUD();

      if (state === STATE.CLEAR) drawClear();
      if (state === STATE.OVER) drawGameOver();
    }
    ctx.restore();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ensure mouse coords are correct after resize
  window.addEventListener('resize', () => {
    requestAnimationFrame(() => {
      // recompute scale-based coords next mouse event
    });
  });
})();
</script>
</body>
