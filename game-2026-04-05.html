<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nebula Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #03010f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// =============================================================================
//  NEBULA DRIFT  –  Space Shooter  |  Genre: Space shooter (no gore)  |  Date: 2026-04-05
//  Controls: Mouse / WASD / Arrow keys to move | Auto-fires bullets
//  Touch: tap & drag to move ship
// =============================================================================

// --- roundRect polyfill for older browsers ---
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// =============================================================================
//  CANVAS SETUP & RESPONSIVE SCALING
// =============================================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BASE_W = 480;
const BASE_H = 720;
let scale = 1;

function resize() {
  scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
  scale = Math.min(scale, 2.5);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = Math.floor(BASE_W * scale) + 'px';
  canvas.style.height = Math.floor(BASE_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// =============================================================================
//  CONSTANTS
// =============================================================================
const COLORS = {
  bg:       '#03010f',
  playerFill: '#00f5ff',
  playerGlow: '#00aaff',
  bullet:   '#ffef00',
  bulletGlow:'#ff9900',
  enemyA:   '#ff4da6',
  enemyB:   '#bf5fff',
  enemyC:   '#ff8c42',
  boss:     '#ff2255',
  starFar:  '#3a3060',
  starMid:  '#9970d6',
  starNear: '#e8d8ff',
  hud:      '#c0aaff',
  hudGlow:  '#9050ff',
  shield:   '#00ffcc',
  powerUp:  '#ffee00',
};

const STATES = { TITLE: 0, PLAYING: 1, GAMEOVER: 2 };

// =============================================================================
//  GAME STATE
// =============================================================================
let state, score, hiScore, lives, wave, waveTimer, waveActive;
let player, bullets, enemyBullets, enemies, particles, stars, powerUps;
let fireTimer, autoFireRate;
let mouse = { x: BASE_W / 2, y: BASE_H - 80 };
let keys = {};
let touchActive = false, touchX = BASE_W / 2, touchY = BASE_H - 80;
let blinkTimer = 0;
let shieldActive, shieldTimer;
let bossActive, bossDefeated;

hiScore = parseInt(localStorage.getItem('nebula_hi') || '0', 10);

// =============================================================================
//  STARS (parallax background)
// =============================================================================
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * BASE_W,
      y: Math.random() * BASE_H,
      r: Math.random() * 1.4 + 0.3,
      speed: Math.random() * 0.6 + 0.15,
      layer: Math.floor(Math.random() * 3), // 0=far, 1=mid, 2=near
      alpha: Math.random() * 0.6 + 0.4,
    });
  }
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed * (s.layer + 1);
    if (s.y > BASE_H + 2) {
      s.y = -2;
      s.x = Math.random() * BASE_W;
    }
  }
}

function drawStars() {
  for (const s of stars) {
    const col = s.layer === 0 ? COLORS.starFar : s.layer === 1 ? COLORS.starMid : COLORS.starNear;
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// =============================================================================
//  PLAYER
// =============================================================================
function initPlayer() {
  player = {
    x: BASE_W / 2,
    y: BASE_H - 80,
    w: 32,
    h: 36,
    speed: 5,
    invincible: 0,
    thrusterAnim: 0,
  };
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const px = player.x, py = player.y;
  ctx.save();

  // Thruster flame
  player.thrusterAnim += 0.25;
  const flicker = 0.8 + Math.sin(player.thrusterAnim * 3.7) * 0.2;
  const flameH = 14 * flicker;
  const grad = ctx.createLinearGradient(px, py + 14, px, py + 14 + flameH);
  grad.addColorStop(0, 'rgba(255,200,50,0.95)');
  grad.addColorStop(0.5, 'rgba(255,80,0,0.7)');
  grad.addColorStop(1, 'rgba(255,50,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(px - 6, py + 14);
  ctx.lineTo(px, py + 14 + flameH);
  ctx.lineTo(px + 6, py + 14);
  ctx.closePath();
  ctx.fill();

  // Ship body glow
  ctx.shadowColor = COLORS.playerGlow;
  ctx.shadowBlur = 18;
  ctx.fillStyle = COLORS.playerFill;

  // Main hull (pointed nose, wide base)
  ctx.beginPath();
  ctx.moveTo(px, py - 18);         // nose tip
  ctx.lineTo(px + 16, py + 14);    // right wing
  ctx.lineTo(px + 8, py + 10);     // right indent
  ctx.lineTo(px, py + 14);         // center
  ctx.lineTo(px - 8, py + 10);     // left indent
  ctx.lineTo(px - 16, py + 14);    // left wing
  ctx.closePath();
  ctx.fill();

  // Cockpit highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aaffff';
  ctx.beginPath();
  ctx.ellipse(px, py - 6, 5, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shield ring
  if (shieldActive) {
    ctx.strokeStyle = COLORS.shield;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = COLORS.shield;
    ctx.shadowBlur = 12;
    ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 120) * 0.2;
    ctx.beginPath();
    ctx.arc(px, py, 26, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function updatePlayer(dt) {
  let tx = mouse.x, ty = mouse.y;
  if (touchActive) { tx = touchX; ty = touchY; }

  // Keyboard override
  let kx = 0, ky = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) kx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) kx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) ky -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) ky += 1;

  if (kx !== 0 || ky !== 0) {
    // Keyboard movement takes priority
    const len = Math.hypot(kx, ky) || 1;
    player.x += (kx / len) * player.speed;
    player.y += (ky / len) * player.speed;
  } else {
    // Mouse / touch glide
    const dx = tx - player.x, dy = ty - player.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 2) {
      const spd = Math.min(player.speed * 1.6, dist * 0.12 * 60 * dt);
      player.x += (dx / dist) * spd;
      player.y += (dy / dist) * spd;
    }
  }

  // Clamp to canvas
  player.x = Math.max(20, Math.min(BASE_W - 20, player.x));
  player.y = Math.max(30, Math.min(BASE_H - 30, player.y));

  if (player.invincible > 0) player.invincible -= 1;
  if (shieldActive) {
    shieldTimer -= 1;
    if (shieldTimer <= 0) shieldActive = false;
  }
}

// =============================================================================
//  BULLETS (player)
// =============================================================================
function initBullets() { bullets = []; }

function fireBullet() {
  const spread = wave >= 5 ? 1 : 0; // spread shot at wave 5+
  bullets.push({ x: player.x, y: player.y - 18, vy: -11, vx: 0, w: 4, h: 12 });
  if (spread) {
    bullets.push({ x: player.x, y: player.y - 14, vy: -10, vx: -2.5, w: 3, h: 10 });
    bullets.push({ x: player.x, y: player.y - 14, vy: -10, vx: 2.5,  w: 3, h: 10 });
  }
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y < -20) bullets.splice(i, 1);
  }
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = COLORS.bulletGlow;
    ctx.shadowBlur = 10;
    ctx.fillStyle = COLORS.bullet;
    ctx.beginPath();
    ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, 2);
    ctx.fill();
    ctx.restore();
  }
}

// =============================================================================
//  ENEMY BULLETS
// =============================================================================
function initEnemyBullets() { enemyBullets = []; }

function fireEnemyBullet(ex, ey, type) {
  const speed = 2.5 + wave * 0.18;
  if (type === 'C' || (type === 'BOSS')) {
    // Aimed at player
    const dx = player.x - ex, dy = player.y - ey;
    const len = Math.hypot(dx, dy) || 1;
    enemyBullets.push({ x: ex, y: ey, vx: (dx / len) * speed, vy: (dy / len) * speed, r: 5, col: type === 'BOSS' ? COLORS.boss : COLORS.enemyC });
  } else {
    enemyBullets.push({ x: ex, y: ey, vx: 0, vy: speed, r: 4, col: COLORS.enemyA });
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > BASE_H + 10 || b.x < -10 || b.x > BASE_W + 10) {
      enemyBullets.splice(i, 1);
    }
  }
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    ctx.save();
    ctx.shadowColor = b.col;
    ctx.shadowBlur = 10;
    ctx.fillStyle = b.col;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// =============================================================================
//  ENEMIES
// =============================================================================
function spawnWave(waveNum) {
  enemies = [];
  enemyBullets = [];
  waveActive = true;
  bossActive = false;

  const isBossWave = waveNum % 5 === 0;
  if (isBossWave) {
    // Boss enemy
    bossActive = true;
    bossDefeated = false;
    enemies.push({
      x: BASE_W / 2, y: 80,
      w: 70, h: 50,
      hp: 20 + waveNum * 2,
      maxHp: 20 + waveNum * 2,
      type: 'BOSS',
      fireTimer: 0,
      fireRate: Math.max(30, 80 - waveNum * 3),
      vx: 1.2,
      vy: 0,
      angle: 0,
      hitFlash: 0,
    });
    return;
  }

  // Regular wave formation
  const cols = Math.min(8, 4 + Math.floor(waveNum / 2));
  const rows = Math.min(5, 2 + Math.floor(waveNum / 3));
  const types = ['A', 'A', 'B', 'C'];
  const startX = (BASE_W - cols * 50) / 2 + 25;
  const startY = 60;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const typeIdx = Math.min(r, types.length - 1);
      enemies.push({
        x: startX + c * 50,
        y: startY + r * 48,
        w: 28, h: 24,
        hp: 1 + (r === rows - 1 ? 1 : 0),
        type: types[typeIdx],
        fireTimer: Math.floor(Math.random() * 120),
        fireRate: Math.max(40, 120 - waveNum * 6 - r * 10),
        vx: 0.5 + waveNum * 0.07,
        vy: 0,
        angle: 0,
        hitFlash: 0,
        diveTimer: 0,
        diving: false,
        diveVx: 0, diveVy: 0,
        baseX: startX + c * 50,
        baseY: startY + r * 48,
        sway: Math.random() * Math.PI * 2,
      });
    }
  }
}

function drawEnemy(e) {
  ctx.save();
  if (e.hitFlash > 0) {
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
  }
  const col = e.type === 'A' ? COLORS.enemyA : e.type === 'B' ? COLORS.enemyB : e.type === 'C' ? COLORS.enemyC : COLORS.boss;
  ctx.shadowColor = col;
  ctx.shadowBlur = 14;
  ctx.fillStyle = col;

  if (e.type === 'BOSS') {
    // Boss: large diamond / hexagon shape
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - 30);
    ctx.lineTo(e.x + 40, e.y - 10);
    ctx.lineTo(e.x + 50, e.y + 10);
    ctx.lineTo(e.x + 30, e.y + 28);
    ctx.lineTo(e.x - 30, e.y + 28);
    ctx.lineTo(e.x - 50, e.y + 10);
    ctx.lineTo(e.x - 40, e.y - 10);
    ctx.closePath();
    ctx.fill();
    // Boss cockpit
    ctx.fillStyle = '#ff99cc';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y, 14, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // Boss health bar
    const bw = 80, bh = 8;
    const bx = e.x - bw / 2, by = e.y + 36;
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#330011';
    ctx.roundRect(bx, by, bw, bh, 3);
    ctx.fill();
    ctx.fillStyle = COLORS.boss;
    ctx.shadowColor = COLORS.boss;
    ctx.shadowBlur = 6;
    ctx.roundRect(bx, by, bw * (e.hp / e.maxHp), bh, 3);
    ctx.fill();
  } else if (e.type === 'A') {
    // Type A: small saucer
    ctx.beginPath();
    ctx.ellipse(e.x, e.y, 14, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffbbdd';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y - 4, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'B') {
    // Type B: angular fighter
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - 12);
    ctx.lineTo(e.x + 12, e.y + 10);
    ctx.lineTo(e.x - 12, e.y + 10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ddaaff';
    ctx.beginPath();
    ctx.arc(e.x, e.y, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'C') {
    // Type C: octagon with aim marker
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const rx = e.x + Math.cos(a) * 13;
      const ry = e.y + Math.sin(a) * 13;
      i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ff8c42';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
    ctx.stroke();
  }

  ctx.restore();
}

// Swarm movement direction
let swarmDir = 1;
let swarmX = 0;

function updateEnemies(dt) {
  if (enemies.length === 0) {
    if (waveActive) {
      waveActive = false;
      waveTimer = 120; // wait before next wave
    }
    return;
  }

  // Move swarm laterally
  if (!bossActive) {
    swarmX += swarmDir * (0.5 + wave * 0.06);

    // Find leftmost / rightmost enemy
    let minX = Infinity, maxX = -Infinity;
    for (const e of enemies) {
      minX = Math.min(minX, e.x - e.w / 2);
      maxX = Math.max(maxX, e.x + e.w / 2);
    }
    if (maxX >= BASE_W - 10 || minX <= 10) {
      swarmDir *= -1;
      for (const e of enemies) e.y += 14; // step down
    }

    for (const e of enemies) {
      e.sway += 0.03;
      e.x = e.baseX + swarmX + Math.sin(e.sway) * 3;
      e.baseX += swarmDir * (0.5 + wave * 0.06);

      e.fireTimer -= 1;
      if (e.fireTimer <= 0 && state === STATES.PLAYING) {
        fireEnemyBullet(e.x, e.y + 12, e.type);
        e.fireTimer = e.fireRate + Math.floor(Math.random() * 40);
      }
      if (e.hitFlash > 0) e.hitFlash -= 1;
    }
  } else {
    // Boss movement: side-to-side, occasionally swoops
    const boss = enemies[0];
    boss.x += boss.vx;
    if (boss.x > BASE_W - 60 || boss.x < 60) boss.vx *= -1;
    boss.y = 80 + Math.sin(Date.now() / 800) * 20;

    boss.fireTimer -= 1;
    if (boss.fireTimer <= 0 && state === STATES.PLAYING) {
      // Boss fires 3-way burst
      fireEnemyBullet(boss.x, boss.y + 20, 'BOSS');
      fireEnemyBullet(boss.x - 20, boss.y + 10, 'A');
      fireEnemyBullet(boss.x + 20, boss.y + 10, 'A');
      boss.fireTimer = boss.fireRate;
    }
    if (boss.hitFlash > 0) boss.hitFlash -= 1;
  }
}

// =============================================================================
//  POWER-UPS
// =============================================================================
function initPowerUps() { powerUps = []; }

function spawnPowerUp(x, y) {
  if (Math.random() < 0.18) {
    const types = ['shield', 'life', 'rapid'];
    powerUps.push({
      x, y,
      type: types[Math.floor(Math.random() * types.length)],
      vy: 1.2,
      anim: 0,
    });
  }
}

function updatePowerUps() {
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const p = powerUps[i];
    p.y += p.vy;
    p.anim += 0.08;
    if (p.y > BASE_H + 20) { powerUps.splice(i, 1); continue; }

    // Collect
    const dx = p.x - player.x, dy = p.y - player.y;
    if (Math.hypot(dx, dy) < 22) {
      if (p.type === 'shield') {
        shieldActive = true;
        shieldTimer = 300;
      } else if (p.type === 'life') {
        lives = Math.min(lives + 1, 5);
      } else if (p.type === 'rapid') {
        autoFireRate = Math.max(8, autoFireRate - 4);
        setTimeout(() => { autoFireRate = 15; }, 7000);
      }
      spawnParticleBurst(p.x, p.y, COLORS.powerUp, 10);
      powerUps.splice(i, 1);
    }
  }
}

function drawPowerUps() {
  for (const p of powerUps) {
    ctx.save();
    const bob = Math.sin(p.anim * 2) * 3;
    const col = p.type === 'shield' ? COLORS.shield : p.type === 'life' ? '#ff5577' : '#ffcc00';
    ctx.shadowColor = col;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x, p.y + bob, 10, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = p.type === 'shield' ? 'S' : p.type === 'life' ? '♥' : 'R';
    ctx.fillText(label, p.x, p.y + bob);
    ctx.restore();
  }
}

// =============================================================================
//  PARTICLES
// =============================================================================
function initParticles() { particles = []; }

function spawnParticleBurst(x, y, col, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 3 + 1,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      col,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.94;
    p.vy *= 0.94;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// =============================================================================
//  COLLISION DETECTION
// =============================================================================
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx - rw / 2, Math.min(cx, rx + rw / 2));
  const nearY = Math.max(ry - rh / 2, Math.min(cy, ry + rh / 2));
  return Math.hypot(cx - nearX, cy - nearY) < cr;
}

function checkCollisions() {
  // Player bullets vs enemies
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (circleRect(b.x, b.y, 4, e.x, e.y, e.w, e.h)) {
        bullets.splice(bi, 1);
        e.hp -= 1;
        e.hitFlash = 8;
        spawnParticleBurst(b.x, b.y, e.type === 'BOSS' ? COLORS.boss : COLORS.enemyA, 5);
        if (e.hp <= 0) {
          score += e.type === 'BOSS' ? (200 + wave * 50) : (10 + wave * 2);
          spawnParticleBurst(e.x, e.y, e.type === 'BOSS' ? COLORS.boss : COLORS.enemyA, 18);
          spawnPowerUp(e.x, e.y);
          enemies.splice(ei, 1);
          if (e.type === 'BOSS') bossDefeated = true;
        }
        break;
      }
    }
  }

  // Enemy bullets vs player
  if (player.invincible > 0) return;
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    if (shieldActive) {
      if (Math.hypot(b.x - player.x, b.y - player.y) < 26) {
        enemyBullets.splice(bi, 1);
        spawnParticleBurst(b.x, b.y, COLORS.shield, 6);
        continue;
      }
    }
    if (Math.hypot(b.x - player.x, b.y - player.y) < 14) {
      enemyBullets.splice(bi, 1);
      playerHit();
      break;
    }
  }

  // Enemies reaching bottom / colliding with player
  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    const e = enemies[ei];
    if (e.y + e.h / 2 > BASE_H - 20) {
      spawnParticleBurst(e.x, e.y, COLORS.enemyA, 12);
      enemies.splice(ei, 1);
      playerHit();
      continue;
    }
    if (player.invincible <= 0 && circleRect(player.x, player.y, 14, e.x, e.y, e.w, e.h)) {
      spawnParticleBurst(e.x, e.y, COLORS.enemyA, 14);
      enemies.splice(ei, 1);
      playerHit();
    }
  }
}

function playerHit() {
  if (shieldActive) { shieldActive = false; shieldTimer = 0; return; }
  lives -= 1;
  spawnParticleBurst(player.x, player.y, COLORS.playerFill, 14);
  player.invincible = 120;
  if (lives <= 0) {
    setTimeout(() => {
      state = STATES.GAMEOVER;
      if (score > hiScore) {
        hiScore = score;
        try { localStorage.setItem('nebula_hi', hiScore); } catch(e) {}
      }
    }, 400);
  }
}

// =============================================================================
//  HUD
// =============================================================================
function drawHUD() {
  ctx.save();
  ctx.font = 'bold 14px Courier New';
  ctx.textBaseline = 'top';

  // Score
  ctx.shadowColor = COLORS.hudGlow;
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.hud;
  ctx.textAlign = 'left';
  ctx.fillText('SCORE  ' + score.toString().padStart(6, '0'), 10, 10);

  // Hi score
  ctx.textAlign = 'center';
  ctx.fillText('HI  ' + hiScore.toString().padStart(6, '0'), BASE_W / 2, 10);

  // Wave
  ctx.textAlign = 'right';
  ctx.fillText('WAVE  ' + wave, BASE_W - 10, 10);

  // Lives as hearts
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff4488';
  ctx.shadowColor = '#ff4488';
  ctx.shadowBlur = 10;
  ctx.font = '16px Courier New';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('♥', 10 + i * 20, BASE_H - 26);
  }

  // Shield indicator
  if (shieldActive) {
    ctx.fillStyle = COLORS.shield;
    ctx.shadowColor = COLORS.shield;
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('SHIELD ' + Math.ceil(shieldTimer / 60) + 's', BASE_W - 10, BASE_H - 26);
  }

  ctx.restore();
}

// =============================================================================
//  TITLE SCREEN
// =============================================================================
function drawTitle() {
  // Background nebula effect
  drawStars();

  ctx.save();
  // Title
  ctx.textAlign = 'center';
  ctx.shadowColor = COLORS.playerGlow;
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 54px Courier New';
  ctx.fillText('NEBULA', BASE_W / 2, 160);
  ctx.shadowColor = COLORS.enemyA;
  ctx.fillStyle = COLORS.playerFill;
  ctx.fillText('DRIFT', BASE_W / 2, 220);

  // Tagline
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aa88ff';
  ctx.font = '14px Courier New';
  ctx.fillText('Defend the cosmos from alien invaders', BASE_W / 2, 270);

  // Controls
  ctx.fillStyle = '#8866cc';
  ctx.font = '13px Courier New';
  ctx.fillText('MOUSE / WASD / ARROWS  ·  AUTO-FIRE', BASE_W / 2, 310);
  ctx.fillText('Collect  ♥ = extra life   S = shield   R = rapid fire', BASE_W / 2, 332);

  // High score
  if (hiScore > 0) {
    ctx.fillStyle = COLORS.bullet;
    ctx.shadowColor = COLORS.bullet;
    ctx.shadowBlur = 8;
    ctx.font = 'bold 16px Courier New';
    ctx.fillText('BEST  ' + hiScore.toString().padStart(6, '0'), BASE_W / 2, 385);
  }

  // Blink prompt
  blinkTimer += 0.06;
  if (Math.sin(blinkTimer * Math.PI) > 0) {
    ctx.shadowColor = COLORS.playerFill;
    ctx.shadowBlur = 12;
    ctx.fillStyle = COLORS.playerFill;
    ctx.font = 'bold 16px Courier New';
    ctx.fillText('— PRESS ANY KEY OR CLICK TO START —', BASE_W / 2, BASE_H - 100);
  }

  // Draw a demo ship
  player.x = BASE_W / 2;
  player.y = BASE_H / 2 + 20;
  player.invincible = 0;
  shieldActive = false;
  drawPlayer();

  ctx.restore();
}

// =============================================================================
//  GAME OVER SCREEN
// =============================================================================
function drawGameOver() {
  drawStars();
  ctx.save();
  ctx.textAlign = 'center';

  ctx.shadowColor = '#ff3366';
  ctx.shadowBlur = 24;
  ctx.fillStyle = '#ff3366';
  ctx.font = 'bold 52px Courier New';
  ctx.fillText('GAME OVER', BASE_W / 2, 160);

  ctx.shadowBlur = 0;
  ctx.fillStyle = COLORS.hud;
  ctx.font = 'bold 20px Courier New';
  ctx.fillText('SCORE   ' + score.toString().padStart(6, '0'), BASE_W / 2, 240);
  ctx.fillStyle = COLORS.bullet;
  ctx.fillText('BEST    ' + hiScore.toString().padStart(6, '0'), BASE_W / 2, 268);
  ctx.fillStyle = '#bb99ff';
  ctx.font = '16px Courier New';
  ctx.fillText('Wave Reached: ' + wave, BASE_W / 2, 305);

  if (score >= hiScore && score > 0) {
    blinkTimer += 0.08;
    if (Math.sin(blinkTimer * Math.PI * 2) > 0) {
      ctx.fillStyle = COLORS.bullet;
      ctx.shadowColor = COLORS.bullet;
      ctx.shadowBlur = 10;
      ctx.font = 'bold 15px Courier New';
      ctx.fillText('✦ NEW HIGH SCORE! ✦', BASE_W / 2, 335);
    }
  }

  // Play again button
  const bw = 200, bh = 48;
  const bx = BASE_W / 2 - bw / 2, by = BASE_H / 2 + 60;
  ctx.shadowColor = COLORS.playerGlow;
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#001833';
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill();
  ctx.strokeStyle = COLORS.playerFill;
  ctx.lineWidth = 2;
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.stroke();
  ctx.fillStyle = COLORS.playerFill;
  ctx.font = 'bold 20px Courier New';
  ctx.shadowBlur = 12;
  ctx.fillText('PLAY AGAIN', BASE_W / 2, by + bh / 2 + 7);

  ctx.restore();

  // Store button bounds for click detection
  drawGameOver._btn = { x: bx, y: by, w: bw, h: bh };
}

// =============================================================================
//  FULL RESET
// =============================================================================
function resetGame() {
  score = 0;
  lives = 3;
  wave = 0;
  waveTimer = 0;
  waveActive = false;
  swarmX = 0;
  swarmDir = 1;
  shieldActive = false;
  shieldTimer = 0;
  autoFireRate = 15;
  fireTimer = 0;
  initPlayer();
  initBullets();
  initEnemyBullets();
  initPowerUps();
  initParticles();
  initStars();
  nextWave();
  state = STATES.PLAYING;
}

function nextWave() {
  wave += 1;
  swarmX = 0;
  swarmDir = 1;
  spawnWave(wave);
}

// =============================================================================
//  INPUT
// =============================================================================
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (state === STATES.TITLE) { resetGame(); }
  if (state === STATES.GAMEOVER && (e.key === 'Enter' || e.key === ' ')) { resetGame(); }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

window.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / scale;
  mouse.y = (e.clientY - rect.top) / scale;
});

window.addEventListener('click', (e) => {
  if (state === STATES.TITLE) { resetGame(); return; }
  if (state === STATES.GAMEOVER) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / scale;
    const my = (e.clientY - rect.top) / scale;
    const btn = drawGameOver._btn;
    if (btn && mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
      resetGame();
    }
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchActive = true;
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = (t.clientX - rect.left) / scale;
  touchY = (t.clientY - rect.top) / scale;
  if (state === STATES.TITLE) { resetGame(); }
  if (state === STATES.GAMEOVER) {
    const btn = drawGameOver._btn;
    if (btn && touchX >= btn.x && touchX <= btn.x + btn.w && touchY >= btn.y && touchY <= btn.y + btn.h) {
      resetGame();
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  touchX = (t.clientX - rect.left) / scale;
  touchY = (t.clientY - rect.top) / scale;
}, { passive: false });

canvas.addEventListener('touchend', () => { touchActive = false; });

// =============================================================================
//  MAIN GAME LOOP
// =============================================================================
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, BASE_W, BASE_H);

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, BASE_H);
  bgGrad.addColorStop(0, '#020010');
  bgGrad.addColorStop(1, '#0a0020');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  if (state === STATES.TITLE) {
    updateStars();
    drawTitle();
    return;
  }

  if (state === STATES.GAMEOVER) {
    updateStars();
    updateParticles();
    drawParticles();
    drawGameOver();
    return;
  }

  // === PLAYING ===
  updateStars();

  // Wave management
  if (!waveActive) {
    waveTimer -= 1;
    if (waveTimer <= 0) nextWave();
  }

  // Auto fire
  fireTimer -= 1;
  if (fireTimer <= 0 && state === STATES.PLAYING) {
    fireBullet();
    fireTimer = autoFireRate;
  }

  updatePlayer(dt);
  updateBullets();
  updateEnemyBullets();
  updateEnemies(dt);
  updatePowerUps();
  updateParticles();
  checkCollisions();

  // Draw everything
  drawStars();
  drawParticles();
  drawPowerUps();
  for (const e of enemies) drawEnemy(e);
  drawBullets();
  drawEnemyBullets();
  drawPlayer();
  drawHUD();

  // Wave cleared banner
  if (!waveActive && waveTimer > 60) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = COLORS.bullet;
    ctx.shadowBlur = 20;
    ctx.fillStyle = COLORS.bullet;
    ctx.font = 'bold 28px Courier New';
    ctx.globalAlpha = Math.min(1, (waveTimer - 60) / 30);
    ctx.fillText('WAVE ' + wave + ' CLEARED!', BASE_W / 2, BASE_H / 2 - 20);
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.font = '16px Courier New';
    ctx.fillText(bossDefeated ? '★ BOSS DESTROYED ★' : '', BASE_W / 2, BASE_H / 2 + 16);
    ctx.restore();
  }
}

// =============================================================================
//  INIT
// =============================================================================
state = STATES.TITLE;
score = 0;
lives = 3;
wave = 0;
initStars();
// Init player for title screen display
player = { x: BASE_W / 2, y: BASE_H / 2 + 20, w: 32, h: 36, invincible: 0, thrusterAnim: 0 };
shieldActive = false;

requestAnimationFrame(loop);

</script>
</body>
