<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Void Drift</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020209;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// =============================================================================
//  VOID DRIFT  –  Dodge Game  |  Genre: Dodge game  |  Date: 2026-04-07
//  Move your orb with the mouse or touch to dodge incoming threats.
//  Survive as long as possible — the void gets hungrier every second.
// =============================================================================

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Responsive canvas ──────────────────────────────────────────────────────
const W = 480, H = 480;
let scale = 1;
function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Game states ────────────────────────────────────────────────────────────
const S = { TITLE: 0, PLAYING: 1, DEAD: 2 };
let state = S.TITLE;

// ── Palette ────────────────────────────────────────────────────────────────
const C = {
  bg:      '#020209',
  player:  '#00e5ff',
  bullet:  '#ff3860',
  seeker:  '#ff9f43',
  beam:    '#c084fc',
  gem:     '#ffd700',
  text:    '#ffffff',
  grid:    'rgba(80,60,160,0.12)',
};

// ── State vars ─────────────────────────────────────────────────────────────
let score, hiScore, lives, elapsed, frameCount;
let player, bullets, seekers, beams, gems, particles;
let shakeAmt, flashAlpha;

hiScore = 0;

// ── Grid lines (static decorative background) ──────────────────────────────
const GRID = 40;

// ── Player ─────────────────────────────────────────────────────────────────
function makePlayer() {
  return {
    x: W / 2, y: H / 2,
    r: 11,
    tx: W / 2, ty: H / 2,  // target (mouse/touch)
    trail: [],
    invTimer: 0,            // invincibility frames after hit
    dead: false,
  };
}

// ── Spawn helpers ───────────────────────────────────────────────────────────

// Bullet: straight line from edge toward a point near player
function spawnBullet() {
  const edge = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const spread = 80;
  const spd = 3.2 + elapsed * 0.0004;

  if (edge === 0) { x = Math.random() * W; y = -10; }
  else if (edge === 1) { x = W + 10; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 10; }
  else                 { x = -10; y = Math.random() * H; }

  // Aim toward player with slight random spread
  const ax = player.x + (Math.random() - 0.5) * spread;
  const ay = player.y + (Math.random() - 0.5) * spread;
  const d  = Math.hypot(ax - x, ay - y) || 1;
  vx = ((ax - x) / d) * spd;
  vy = ((ay - y) / d) * spd;

  bullets.push({ x, y, vx, vy, r: 6, life: 1 });
}

// Seeker: slow homing enemy that tracks the player
function spawnSeeker() {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.hypot(W, H) / 2 + 20;
  seekers.push({
    x: W / 2 + Math.cos(angle) * dist,
    y: H / 2 + Math.sin(angle) * dist,
    r: 9,
    spd: 0.9 + elapsed * 0.00015,
    angle,
    wobble: Math.random() * Math.PI * 2,
  });
}

// Beam: a sweeping laser from a random edge point
function spawnBeam() {
  const edge  = Math.floor(Math.random() * 4);
  let x, y, dir;
  if      (edge === 0) { x = Math.random() * W; y = 0;  dir = Math.PI * 0.5 + (Math.random() - 0.5) * 0.5; }
  else if (edge === 1) { x = W; y = Math.random() * H;  dir = Math.PI       + (Math.random() - 0.5) * 0.5; }
  else if (edge === 2) { x = Math.random() * W; y = H;  dir = Math.PI * 1.5 + (Math.random() - 0.5) * 0.5; }
  else                 { x = 0; y = Math.random() * H;  dir = 0             + (Math.random() - 0.5) * 0.5; }

  beams.push({
    ox: x, oy: y,           // origin
    dir,                    // sweep direction angle
    len: Math.hypot(W, H),
    w: 10,
    life: 1, decay: 0.014,  // fades out
    sweep: (Math.random() > 0.5 ? 1 : -1) * 0.012,  // rotation speed
    warned: false, warnTimer: 40,  // telegraph before active
  });
}

// Gem: collectible that grants +1 life (rare) or big score bonus
function spawnGem() {
  const margin = 30;
  gems.push({
    x: margin + Math.random() * (W - margin * 2),
    y: margin + Math.random() * (H - margin * 2),
    r: 8,
    bob: Math.random() * Math.PI * 2,
    life: 1, decay: 0.0015,  // slowly fades out if not collected
    type: Math.random() < 0.2 ? 'heart' : 'gem',
  });
}

// ── Particles ───────────────────────────────────────────────────────────────
function burst(x, y, color, n, opts = {}) {
  for (let i = 0; i < n; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = (opts.minS ?? 1) + Math.random() * (opts.maxS ?? 4);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      color,
      r: (opts.minR ?? 2) + Math.random() * (opts.maxR ?? 3),
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
    });
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
function startGame() {
  score      = 0;
  lives      = 3;
  elapsed    = 0;
  frameCount = 0;
  shakeAmt   = 0;
  flashAlpha = 0;
  player     = makePlayer();
  bullets    = [];
  seekers    = [];
  beams      = [];
  gems       = [];
  particles  = [];
  // Reset spawn timers
  nextBullet  = 60;
  nextSeeker  = 180;
  nextBeam    = 400;
  nextGem     = 300;
  state       = S.PLAYING;
}

let nextBullet = 60, nextSeeker = 180, nextBeam = 400, nextGem = 300;

// ── Geometry helpers ────────────────────────────────────────────────────────
function circleHit(ax, ay, ar, bx, by, br) {
  return Math.hypot(ax - bx, ay - by) < ar + br;
}

// Distance from point (px,py) to line segment (ax,ay)→(bx,by)
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// ── Update ──────────────────────────────────────────────────────────────────
function takeDamage() {
  if (player.invTimer > 0 || player.dead) return;
  lives--;
  shakeAmt   = 12;
  flashAlpha = 0.55;
  burst(player.x, player.y, C.player, 18, { minS: 2, maxS: 7 });
  if (lives <= 0) {
    player.dead = true;
    if (score > hiScore) hiScore = score;
    setTimeout(() => { state = S.DEAD; }, 900);
  } else {
    player.invTimer = 90;  // ~1.5 seconds of invincibility
  }
}

function update() {
  if (state !== S.PLAYING) return;

  frameCount++;
  elapsed += 1 / 60;
  score = Math.floor(elapsed * 10);

  // Screen shake decay
  shakeAmt   *= 0.82;
  flashAlpha *= 0.88;

  // ── Move player toward target (mouse/touch smoothing) ──
  if (!player.dead) {
    player.x += (player.tx - player.x) * 0.18;
    player.y += (player.ty - player.y) * 0.18;
    // Clamp inside canvas
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    // Trail
    player.trail.push({ x: player.x, y: player.y });
    if (player.trail.length > 12) player.trail.shift();

    if (player.invTimer > 0) player.invTimer--;
  }

  // ── Spawning (intervals shrink with time) ──
  const speedScale = 1 + elapsed / 60;
  nextBullet--;
  nextSeeker--;
  nextBeam--;
  nextGem--;

  if (nextBullet <= 0) {
    // Spawn 1–3 bullets depending on difficulty
    const n = 1 + Math.floor(elapsed / 20);
    for (let i = 0; i < Math.min(n, 4); i++) spawnBullet();
    nextBullet = Math.max(18, Math.round(55 / speedScale));
  }
  if (nextSeeker <= 0) {
    spawnSeeker();
    nextSeeker = Math.max(80, Math.round(200 / speedScale));
  }
  if (nextBeam <= 0 && elapsed > 8) {
    spawnBeam();
    nextBeam = Math.max(200, Math.round(500 / speedScale));
  }
  if (nextGem <= 0) {
    if (gems.length < 3) spawnGem();
    nextGem = 300;
  }

  // ── Update bullets ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    // Remove if off screen
    if (b.x < -30 || b.x > W + 30 || b.y < -30 || b.y > H + 30) {
      bullets.splice(i, 1); continue;
    }
    // Hit player
    if (!player.dead && circleHit(player.x, player.y, player.r - 3, b.x, b.y, b.r - 2)) {
      burst(b.x, b.y, C.bullet, 8, { minS: 1, maxS: 3 });
      bullets.splice(i, 1);
      takeDamage();
    }
  }

  // ── Update seekers ──
  for (let i = seekers.length - 1; i >= 0; i--) {
    const s = seekers[i];
    s.wobble += 0.05;
    // Home toward player with wobble
    const dx = player.x - s.x, dy = player.y - s.y;
    const d  = Math.hypot(dx, dy) || 1;
    s.x += (dx / d) * s.spd + Math.cos(s.wobble) * 0.4;
    s.y += (dy / d) * s.spd + Math.sin(s.wobble) * 0.4;

    // Remove if far off screen (shouldn't happen but safety net)
    if (Math.hypot(s.x - W/2, s.y - H/2) > H * 1.5) {
      seekers.splice(i, 1); continue;
    }

    if (!player.dead && circleHit(player.x, player.y, player.r - 3, s.x, s.y, s.r - 2)) {
      burst(s.x, s.y, C.seeker, 12, { minR: 2, maxR: 5 });
      seekers.splice(i, 1);
      takeDamage();
    }
  }

  // ── Update beams ──
  for (let i = beams.length - 1; i >= 0; i--) {
    const b = beams[i];
    if (b.warnTimer > 0) { b.warnTimer--; continue; }  // telegraph phase
    b.dir  += b.sweep;
    b.life -= b.decay;
    if (b.life <= 0) { beams.splice(i, 1); continue; }

    // Beam endpoints
    const ex = b.ox + Math.cos(b.dir) * b.len;
    const ey = b.oy + Math.sin(b.dir) * b.len;

    if (!player.dead && ptSegDist(player.x, player.y, b.ox, b.oy, ex, ey) < b.w / 2 + player.r - 4) {
      takeDamage();
    }
  }

  // ── Update gems ──
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    g.bob  += 0.06;
    g.life -= g.decay;
    if (g.life <= 0) { gems.splice(i, 1); continue; }

    if (!player.dead && circleHit(player.x, player.y, player.r + 6, g.x, g.y + Math.sin(g.bob) * 4, g.r)) {
      burst(g.x, g.y, g.type === 'heart' ? '#ff6b8a' : C.gem, 14, { minR: 2, maxR: 5 });
      if (g.type === 'heart' && lives < 5) lives++;
      else score += 50;
      gems.splice(i, 1);
    }
  }

  // ── Update particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Draw helpers ────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Scrolling grid gives sense of motion
  const off = (elapsed * 18) % GRID;
  ctx.strokeStyle = C.grid;
  ctx.lineWidth   = 1;
  for (let x = -off; x < W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = -off; y < H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,5,0.7)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = C.bullet;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = C.bullet;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    // Bright core
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawSeekers() {
  for (const s of seekers) {
    ctx.save();
    ctx.shadowColor = C.seeker;
    ctx.shadowBlur  = 16;
    ctx.translate(s.x, s.y);
    ctx.rotate(s.wobble);
    // Triangle shape
    ctx.fillStyle = C.seeker;
    ctx.beginPath();
    ctx.moveTo(0, -s.r);
    ctx.lineTo(s.r * 0.85,  s.r * 0.65);
    ctx.lineTo(-s.r * 0.85, s.r * 0.65);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, s.r * 0.28, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawBeams() {
  for (const b of beams) {
    const ex = b.ox + Math.cos(b.dir) * b.len;
    const ey = b.oy + Math.sin(b.dir) * b.len;

    if (b.warnTimer > 0) {
      // Warning: thin dashed line
      const wAlpha = 0.3 + 0.4 * Math.sin(b.warnTimer * 0.3);
      ctx.save();
      ctx.globalAlpha   = wAlpha;
      ctx.strokeStyle   = C.beam;
      ctx.lineWidth     = 1.5;
      ctx.setLineDash([8, 6]);
      ctx.beginPath(); ctx.moveTo(b.ox, b.oy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      continue;
    }

    ctx.save();
    ctx.globalAlpha = b.life;
    ctx.shadowColor = C.beam;
    ctx.shadowBlur  = 22;
    ctx.strokeStyle = C.beam;
    ctx.lineWidth   = b.w;
    ctx.lineCap     = 'round';
    ctx.beginPath(); ctx.moveTo(b.ox, b.oy); ctx.lineTo(ex, ey); ctx.stroke();
    // Bright core
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = b.w * 0.25;
    ctx.shadowBlur  = 0;
    ctx.beginPath(); ctx.moveTo(b.ox, b.oy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.restore();
  }
}

function drawGems() {
  for (const g of gems) {
    const yOff = Math.sin(g.bob) * 4;
    ctx.save();
    ctx.globalAlpha = g.life;
    ctx.shadowBlur  = 18;

    if (g.type === 'heart') {
      // Draw heart
      ctx.shadowColor = '#ff6b8a';
      ctx.fillStyle   = '#ff6b8a';
      ctx.save();
      ctx.translate(g.x, g.y + yOff);
      ctx.scale(0.7, 0.7);
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.bezierCurveTo(-14, -6, -14, -18, 0, -10);
      ctx.bezierCurveTo(14,  -18,  14, -6, 0, 4);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font      = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('+♥', g.x, g.y + yOff + 18);
    } else {
      // Diamond
      ctx.shadowColor = C.gem;
      ctx.fillStyle   = C.gem;
      ctx.beginPath();
      ctx.moveTo(g.x,          g.y + yOff - g.r);
      ctx.lineTo(g.x + g.r,    g.y + yOff);
      ctx.lineTo(g.x,          g.y + yOff + g.r);
      ctx.lineTo(g.x - g.r,    g.y + yOff);
      ctx.closePath();
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,200,0.5)';
      ctx.beginPath();
      ctx.moveTo(g.x - g.r * 0.1, g.y + yOff - g.r);
      ctx.lineTo(g.x + g.r * 0.5, g.y + yOff - g.r * 0.25);
      ctx.lineTo(g.x,             g.y + yOff);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawPlayer() {
  if (player.dead) return;

  // Blink during invincibility
  if (player.invTimer > 0 && Math.floor(player.invTimer / 5) % 2 === 0) return;

  const { x, y, r, trail } = player;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const a = (i / trail.length) * 0.35;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle   = C.player;
    ctx.beginPath(); ctx.arc(t.x, t.y, r * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Outer glow ring
  ctx.save();
  ctx.shadowColor = C.player;
  ctx.shadowBlur  = 24;
  ctx.strokeStyle = C.player;
  ctx.lineWidth   = 2.5;
  ctx.beginPath(); ctx.arc(x, y, r + 4, 0, Math.PI * 2); ctx.stroke();

  // Core
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 1, x, y, r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, C.player);
  grad.addColorStop(1, '#004455');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  const t = elapsed;
  const s = Math.floor(t);
  const ms = Math.floor((t - s) * 10);
  const timeStr = String(s).padStart(4, '0') + '.' + ms + 's';

  ctx.save();
  ctx.textBaseline = 'top';
  ctx.font         = 'bold 17px Courier New';

  // Time
  ctx.shadowColor = C.player;
  ctx.shadowBlur  = 8;
  ctx.fillStyle   = C.text;
  ctx.textAlign   = 'center';
  ctx.fillText(timeStr, W / 2, 12);

  // Gems score
  ctx.shadowColor = C.gem;
  ctx.font        = '13px Courier New';
  ctx.textAlign   = 'right';
  ctx.fillStyle   = 'rgba(255,215,0,0.85)';
  ctx.fillText('+' + (score - Math.floor(elapsed * 10) + score) + ' pts', W - 12, 12);

  ctx.fillStyle   = C.text;
  ctx.font        = 'bold 17px Courier New';
  ctx.shadowColor = C.text;
  ctx.textAlign   = 'left';
  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle   = '#ff6b8a';
    ctx.shadowColor = '#ff6b8a';
    ctx.fillText('♥', 10 + i * 22, 10);
  }
  ctx.restore();

  // Hi score
  if (hiScore > 0) {
    ctx.save();
    ctx.fillStyle    = 'rgba(180,150,255,0.6)';
    ctx.font         = '11px Courier New';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('BEST ' + hiScore + 's', W / 2, 34);
    ctx.restore();
  }
}

function drawTitle() {
  drawBg();

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = '#c084fc';
  ctx.shadowBlur  = 45;
  ctx.fillStyle   = '#c084fc';
  ctx.font        = 'bold 70px Courier New';
  ctx.fillText('VOID', W / 2, H / 2 - 65);

  ctx.shadowColor = C.player;
  ctx.shadowBlur  = 45;
  ctx.fillStyle   = C.player;
  ctx.fillText('DRIFT', W / 2, H / 2 + 5);

  ctx.shadowBlur  = 0;
  ctx.fillStyle   = 'rgba(255,255,255,0.55)';
  ctx.font        = '13px Courier New';
  ctx.fillText('Move your orb to dodge all threats', W / 2, H / 2 + 65);
  ctx.fillText('Catch ◆ gems for points  •  ♥ hearts for lives', W / 2, H / 2 + 88);

  const a = 0.4 + 0.6 * Math.sin(Date.now() / 530);
  ctx.globalAlpha  = a;
  ctx.fillStyle    = '#fff';
  ctx.font         = 'bold 16px Courier New';
  ctx.fillText('Move mouse / touch to start', W / 2, H / 2 + 130);
  ctx.restore();

  if (hiScore > 0) {
    ctx.fillStyle    = 'rgba(255,215,0,0.8)';
    ctx.font         = '13px Courier New';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('BEST: ' + hiScore + 's', W / 2, H / 2 + 162);
  }
}

function drawDead() {
  drawBg();
  drawParticles();

  ctx.fillStyle = 'rgba(2,2,9,0.8)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = '#ff3860';
  ctx.shadowBlur  = 28;
  ctx.fillStyle   = '#ff3860';
  ctx.font        = 'bold 52px Courier New';
  ctx.fillText('CONSUMED', W / 2, H / 2 - 75);

  ctx.shadowBlur = 0;
  const s  = Math.floor(elapsed);
  const ms = Math.floor((elapsed - s) * 10);
  ctx.fillStyle = '#fff';
  ctx.font      = '22px Courier New';
  ctx.fillText('Survived: ' + s + '.' + ms + ' seconds', W / 2, H / 2 - 15);

  if (elapsed >= hiScore) {
    ctx.fillStyle = '#ffd700';
    ctx.font      = 'bold 15px Courier New';
    ctx.fillText('✦ NEW BEST! ✦', W / 2, H / 2 + 22);
  } else {
    ctx.fillStyle = 'rgba(180,150,255,0.7)';
    ctx.font      = '13px Courier New';
    ctx.fillText('Best: ' + hiScore + 's', W / 2, H / 2 + 22);
  }

  // Button
  const by = H / 2 + 95;
  ctx.shadowColor = C.player;
  ctx.shadowBlur  = 16;
  ctx.fillStyle   = C.player;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(W / 2 - 110, by - 26, 220, 52, 10) : ctx.rect(W / 2 - 110, by - 26, 220, 52);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle  = '#000';
  ctx.font       = 'bold 17px Courier New';
  ctx.fillText('PLAY AGAIN', W / 2, by);

  ctx.restore();
}

// ── Screen flash overlay ─────────────────────────────────────────────────────
function drawEffects() {
  if (flashAlpha > 0.01) {
    ctx.save();
    ctx.fillStyle   = `rgba(255,50,80,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

// ── Main loop ────────────────────────────────────────────────────────────────
function loop() {
  // Apply screen shake
  const sx = shakeAmt > 0.5 ? (Math.random() - 0.5) * shakeAmt : 0;
  const sy = shakeAmt > 0.5 ? (Math.random() - 0.5) * shakeAmt : 0;

  ctx.save();
  if (sx || sy) ctx.translate(sx, sy);

  if      (state === S.TITLE) { drawTitle(); }
  else if (state === S.DEAD)  { drawDead(); update(); }
  else {
    update();
    drawBg();
    drawBeams();
    drawGems();
    drawBullets();
    drawSeekers();
    drawParticles();
    drawPlayer();
    drawHUD();
    drawEffects();
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────────────────────────
function handleMove(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const nx = (cx - rect.left) / scale;
  const ny = (cy - rect.top)  / scale;

  if (state === S.TITLE) {
    player = makePlayer();
    player.tx = nx; player.ty = ny;
    startGame();
    return;
  }
  if (state === S.DEAD) return;

  player.tx = nx;
  player.ty = ny;
}

canvas.addEventListener('mousemove',  e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('touchmove',  e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

canvas.addEventListener('click', () => {
  if (state === S.DEAD) startGame();
});
document.addEventListener('keydown', e => {
  if (state === S.TITLE) { startGame(); return; }
  if (state === S.DEAD)  { startGame(); return; }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
player = makePlayer();
bullets = []; seekers = []; beams = []; gems = []; particles = [];
requestAnimationFrame(loop);
</script>
</body>
</html>
